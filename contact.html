<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Make Up Online</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link rel="stylesheet" href="style_page.css">
    <script src="script.js"></script>
</head>
<body>

<!-- HEADER -->
<section id="header">
    <h1>Make Up Online</h1>
    <div>
        <ul id="navbar">
            <li><a href="html_page.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
            <li><a href="cart.html"><i class="fas fa-shopping-cart"></i></a></li>
            <li><a href="login.html"><i class="fas fa-user"></i></a></li>
        </ul>
    </div>
</section>

<!-- PAGE HEADER -->
<section id="page-header">
    <h2>#contact</h2>
    <p>Get in touch with us</p>
</section>

<!-- CONTACT DETAILS -->
<section id="contact-details" class="section-p1">
    <div class="details">
        <span>CONTACT INFO</span>
        <h2>Visit us or contact us today</h2>
        <h3>Shop Information</h3>
        <ul>
            <li>
                <i class="fas fa-user"></i>
                <p>Yasmine Hamza</p>
            </li>
            <li>
                <i class="fas fa-phone-alt"></i>
                <p>+216 29 006 212</p>
            </li>
            <li>
                <i class="fas fa-map-marker-alt"></i>
                <p>Tunisia</p>
            </li>
            <li>
                <i class="fas fa-clock"></i>
                <p>Monday to Saturday: 9:00 - 18:00</p>
            </li>
        </ul>
    </div>

    <!-- MAP -->
    <div class="map">
        <iframe 
            src="https://www.google.com/maps?q=Tunisia&output=embed"
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>
</section>

<!-- CONTACT FORM -->
<section id="form-details">
    <form>
        <span>LEAVE A MESSAGE</span>
        <h2>We love to hear from you</h2>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="E-mail">
        <input type="text" placeholder="Subject">
        <textarea cols="30" rows="10" placeholder="Your Message"></textarea>
        <button class="normal">Submit</button>
    </form>
</section>

</body>
</html>
