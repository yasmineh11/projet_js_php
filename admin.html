<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Products</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #fdf6f9; color: #222; }

        header {
            background: #e91e63;
            color: #fff;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 20px; }
        header a { color: #fff; text-decoration: none; font-size: 13px; opacity: .85; }
        header a:hover { opacity: 1; }
        header .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 16px;
        }
        header .logout-btn:hover { background: rgba(255,255,255,0.35); }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(233,30,99,.08);
            padding: 28px 30px;
            margin-bottom: 30px;
        }
        .card h2 { font-size: 17px; margin-bottom: 20px; color: #e91e63; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-grid .full { grid-column: 1 / -1; }

        label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e8e0e5;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
            background: #fdf6f9;
        }
        input:focus, textarea:focus { border-color: #e91e63; background: #fff; }

        .btn-pink {
            padding: 11px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: #e91e63;
            color: #fff;
            transition: background .2s;
            margin-top: 16px;
        }
        .btn-pink:hover { background: #c2185b; }

        .btn-red {
            background: #fce4ec;
            color: #c62828;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-red:hover { background: #f48fb1; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
        .alert.error   { background: #fce4ec; color: #c62828; border: 1px solid #f48fb1; display: block; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; background: #fdf6f9; color: #888; font-size: 12px; font-weight: 600; border-bottom: 2px solid #f0e0e8; }
        td { padding: 12px; border-bottom: 1px solid #f8f0f4; vertical-align: middle; }
        tr:hover td { background: #fff5f8; }
        td img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; }

        .badge-stock {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .in-stock  { background: #e8f5e9; color: #2e7d32; }
        .low-stock { background: #fff8e1; color: #f57f17; }
        .no-stock  { background: #fce4ec; color: #c62828; }

        /* Login overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(233,30,99,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        #login-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 8px 40px rgba(233,30,99,0.15);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        #login-box h2 { color: #e91e63; margin-bottom: 8px; font-size: 22px; }
        #login-box p  { color: #888; font-size: 13px; margin-bottom: 24px; }
        #login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e8e0e5;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
            background: #fdf6f9;
        }
        #login-box input:focus { border-color: #e91e63; background: #fff; }
        #login-box button {
            width: 100%;
            padding: 13px;
            background: #e91e63;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        #login-box button:hover { background: #c2185b; }
        #login-error {
            color: #c62828;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
    <div id="login-box">
        <h2><i class="fas fa-lock"></i> Admin Access</h2>
        <p>Enter your admin password to continue</p>
        <input type="password" id="admin-pw" placeholder="Password" onkeydown="if(event.key==='Enter') checkPassword()">
        <button onclick="checkPassword()">Enter Admin Panel</button>
        <div id="login-error">⚠ Wrong password. Access denied.</div>
    </div>
</div>

<header>
    <h1><i class="fas fa-cog"></i> Admin — Products</h1>
    <div style="display:flex; align-items:center; gap:12px;">
        <a href="shop.html"><i class="fas fa-arrow-left"></i> Back to Shop</a>
        <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</header>

<div class="container">

    <!-- Add Product Form -->
    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
        <div class="alert" id="form-alert"></div>
        <div class="form-grid">
            <div>
                <label>Product Name *</label>
                <input type="text" id="p-name" placeholder="e.g. Mascara">
            </div>
            <div>
                <label>Brand / Description</label>
                <input type="text" id="p-desc" placeholder="e.g. Essence">
            </div>
            <div>
                <label>Price (dt) *</label>
                <input type="number" id="p-price" placeholder="e.g. 14.90" step="0.01" min="0">
            </div>
            <div>
                <label>Stock *</label>
                <input type="number" id="p-stock" placeholder="e.g. 50" min="0">
            </div>
            <div class="full">
                <label>Image path (relative to project folder)</label>
                <input type="text" id="p-image" placeholder="e.g. images/mascara.jpg">
            </div>
        </div>
        <button class="btn-pink" onclick="addProduct()">
            <i class="fas fa-plus"></i> Add Product
        </button>
    </div>

    <!-- Products List -->
    <div class="card">
        <h2><i class="fas fa-box"></i> All Products</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="products-table">
                <tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px">Loading…</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
const API = '/api/products.php';
const ADMIN_PASSWORD = 'admin123'; // Change this to your preferred password

// ── Password protection ───────────────────────
function checkPassword() {
    const pw = document.getElementById('admin-pw').value;
    if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_auth', ADMIN_PASSWORD);
        document.getElementById('login-overlay').style.display = 'none';
        loadTable();
    } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('admin-pw').value = '';
        document.getElementById('admin-pw').focus();
    }
}

function adminLogout() {
    sessionStorage.removeItem('admin_auth');
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('admin-pw').value = '';
    document.getElementById('login-error').style.display = 'none';
}

// Check on page load
window.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('admin_auth') === ADMIN_PASSWORD) {
        document.getElementById('login-overlay').style.display = 'none';
        loadTable();
    }
});

// ── Products ──────────────────────────────────
async function loadTable() {
    const tbody = document.getElementById('products-table');
    try {
        const res = await fetch(API);
        const products = await res.json();

        if (!products.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px">No products yet.</td></tr>';
            return;
        }

        tbody.innerHTML = products.map(p => `
            <tr id="row-${p.id}">
                <td>${p.id}</td>
                <td><img src="${p.image}" onerror="this.src=''" alt="${p.name}"></td>
                <td><strong>${p.name}</strong></td>
                <td>${p.description || '-'}</td>
                <td>${parseFloat(p.price).toFixed(3)} dt</td>
                <td>
                    <span class="badge-stock ${p.stock > 10 ? 'in-stock' : p.stock > 0 ? 'low-stock' : 'no-stock'}">
                        ${p.stock} in stock
                    </span>
                </td>
                <td>
                    <button class="btn-red" onclick="deleteProduct(${p.id})">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:red;padding:30px">Error loading products.</td></tr>';
    }
}

async function addProduct() {
    const name    = document.getElementById('p-name').value.trim();
    const desc    = document.getElementById('p-desc').value.trim();
    const price   = parseFloat(document.getElementById('p-price').value);
    const stock   = parseInt(document.getElementById('p-stock').value) || 0;
    const image   = document.getElementById('p-image').value.trim();
    const alertEl = document.getElementById('form-alert');

    if (!name || !price || isNaN(price)) {
        alertEl.className = 'alert error';
        alertEl.textContent = '⚠ Name and a valid price are required.';
        return;
    }

    try {
        const res  = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description: desc, price, stock, image })
        });
        const data = await res.json();

        if (data.success) {
            alertEl.className = 'alert success';
            alertEl.textContent = '✓ Product added successfully!';
            document.getElementById('p-name').value  = '';
            document.getElementById('p-desc').value  = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-stock').value = '';
            document.getElementById('p-image').value = '';
            loadTable();
            setTimeout(() => { alertEl.className = 'alert'; }, 3000);
        } else {
            alertEl.className = 'alert error';
            alertEl.textContent = '⚠ ' + (data.error || 'Failed to add product.');
        }
    } catch (err) {
        alertEl.className = 'alert error';
        alertEl.textContent = '⚠ Connection error. Please try again.';
    }
}

async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    const res  = await fetch(`${API}?id=${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
        document.getElementById('row-' + id)?.remove();
    }
}
</script>
</body>
</html>
